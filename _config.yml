##########
# collectionbuilder-csv
# Jekyll Digital Collection Generator
# https://github.com/CollectionBuilder/collectionbuilder-csv
##########

##########
# URL VARIABLES
#
# site domain, full URL to the production location of your collection
url: https://cdil.lib.uidaho.edu
# path to location on the domain if necessary e.g. /digital/hjccc
baseurl: /open-invitation
# location of code, the full url to your github repository
source-code: https://github.com/thecdil/open-invitation

# SITE SETTINGS
#
# title of site appears in banner
title: Open Invitation
# tagline, a short phrase that will appear throughout the site in the top banner
tagline: Inviting conversations on open access from diverse fields and perspectives.
# description appears in meta tags and other locations
# this description might appear in search result lists, keep around 160 characters max
description: "Open Invitation is a podcast featuring engaging conversations on all things open access at the University of Idaho and beyond."
# creator of the digital collection, to appear in meta tags; we typically use our GitHub usernames but feel free to just use your name
author: dcnb

##########
# COLLECTION SETTINGS
#
# Set the metadata for your collection (the name of the CSV file in your _data directory that describes the objects in your collection)
# Use the filename of your CSV **without** the ".csv" extension! E.g. _data/metadata.csv --> "metadata"
metadata: open-invitation 
# page generation settings [optional!]
# [optional: only used if you need to tweak CB defaults or generate from more than one data file]
# page_gen:
#   - data: 'demo-metadata'
#     template: 'item'
#     name: 'objectid'
#     dir: 'items'
#     extension: 'html' 
#     filter: 'objectid'  

##########
# PODCAST CONFIGURATION
#
# Podcast Feed Settings for RSS 2.0 distribution
podcast:
  title: "Open Invitation"
  description: "Open Invitation seeks to highlight open access efforts from across the University of Idaho. Interviews feature U of I faculty, staff, and students discussing their cutting-edge research, as well as the benefits and challenges of navigating the open access landscape."
  author: "University of Idaho Library"
  email: "cdil@uidaho.edu"  # MUST be a real email — Apple and Spotify send verification codes here
  language: "en-us"
  explicit: "false"
  type: "episodic"                          # or "serial"
  category: "Education"                     # Apple Podcasts category
  subcategory: "Higher Education"           # Apple Podcasts subcategory
  image: "/assets/img/podcast-cover.jpg"    # 3000x3000 recommended, 1400x1400 minimum
  link: "https://cdil.lib.uidaho.edu/open-invitation/"
  copyright: "University of Idaho Library"
  apple_url: "https://podcasts.apple.com/us/podcast/open-invitation/id1886556688"      # fill in after Apple approval
  spotify_url: "https://open.spotify.com/show/2RmrbW15arGH3DKkyNWF4L"    # fill in after Spotify approval
  amazon_url: "https://music.amazon.com/podcasts/510ab731-fdbe-4985-babe-9ffd260bedd8"     # fill in after Amazon approval

# OHD metadata configuration
objects: objects

##########
# Site/Organization Branding
#   Enter information for your organization (replacing the CDIL links and name below) if you'd like to brand your site with a logo
#   To remove the branding, comment out these values, or delete them.
#
organization-name: "Center for Digital Inquiry and Learning (CDIL)"
organization-link: https://cdil.lib.uidaho.edu/
organization-logo-banner: https://cdil.lib.uidaho.edu/storying-extinction/assets/img/cdil.png
organization-logo-nav: https://cdil.lib.uidaho.edu/assets/img/logo.png

##########
# ROBOTS EXCLUDE
#
# set noindex to true if you do NOT want Google to index your site
# noindex: true 

##########
# BUILD SETTINGS 
#
# Note: use environment variable on build command to include analytics
# JEKYLL_ENV=production jekyll build
# (this is done automatically by gh-pages build)
#
# ignore stuff
exclude: [docs/, Rakefile, rakelib/, README.md, LICENSE, CITATION.cff, CODE_OF_CONDUCT.md, CONTRIBUTING.md, SECURITY.md]
# compress CSS output
sass:
  style: compressed
